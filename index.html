<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A princesa sem coroa</title>
    <meta name="application-name" content="A princesa sem coroa">
    <meta name="theme-color" content="#061120">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Princesa">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <style>
        html {
            height: 100%;
            touch-action: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: #061120;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: serif;
            position: relative;
            touch-action: none;
            /* Impede que o navegador intercepte o toque para scroll ou navegação */
            user-select: none;
            /* Impede que o usuário selecione imagens acidentalmente ao deslizar */
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.38), rgba(0, 0, 0, 0.38)),
                url("imagens/imagemfundo.jpg") center / cover no-repeat;
            pointer-events: none;
            z-index: 0;
            transform: translateZ(0);
            will-change: transform;
        }

        body>* {
            position: relative;
            z-index: 1;
        }

        .falling-sky {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .falling-emoji {
            position: absolute;
            top: -60px;
            left: var(--start-x);
            color: #7fd3ff;
            font-size: var(--emoji-size);
            opacity: var(--emoji-opacity);
            filter: drop-shadow(0 0 6px rgba(87, 184, 255, 0.46));
            animation: emoji-fall var(--fall-duration) linear var(--fall-delay) infinite;
            transform: translate3d(0, -80px, 0) rotate(0deg);
            will-change: transform;
        }

        .heart-constellation {
            position: fixed;
            left: 50%;
            top: 50%;
            width: min(360px, 70vw);
            height: min(300px, 56vw);
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.92);
            transition: opacity 0.8s ease, transform 0.8s ease;
            z-index: 2;
        }

        .heart-constellation.visible {
            opacity: 0.55;
            transform: translate(-50%, -50%) scale(1);
        }

        .constellation-star {
            position: absolute;
            left: var(--star-x);
            top: var(--star-y);
            width: var(--star-size);
            height: var(--star-size);
            border-radius: 50%;
            background: rgba(127, 211, 255, 0.95);
            box-shadow:
                0 0 8px rgba(127, 211, 255, 0.78),
                0 0 18px rgba(74, 174, 255, 0.26);
            animation: constellation-twinkle var(--twinkle-duration) ease-in-out var(--twinkle-delay) infinite;
            transform: translate(-50%, -50%);
        }

        .constellation-line {
            position: absolute;
            left: var(--line-x);
            top: var(--line-y);
            width: var(--line-w);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(127, 211, 255, 0.36), transparent);
            opacity: 0.42;
            transform: rotate(var(--line-rotate));
            transform-origin: left center;
        }

        .moon-trail {
            position: fixed;
            left: 0;
            top: 0;
            color: #7fd3ff;
            font-size: 15px;
            line-height: 1;
            pointer-events: none;
            z-index: 90;
            text-shadow:
                0 0 6px rgba(127, 211, 255, 0.54),
                0 0 12px rgba(74, 174, 255, 0.28);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.7) rotate(-12deg);
            animation: moon-trail-fade 0.9s ease-out forwards;
        }

        .page-magic-dust {
            position: fixed;
            left: 0;
            top: 0;
            color: #7fd3ff;
            font-size: var(--dust-size);
            line-height: 1;
            pointer-events: none;
            z-index: 95;
            text-shadow:
                0 0 7px rgba(127, 211, 255, 0.58),
                0 0 16px rgba(74, 174, 255, 0.28);
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.55);
            animation: page-magic-dust 0.95s ease-out forwards;
        }

        .final-star-shower {
            position: fixed;
            top: -40px;
            left: var(--star-start-x);
            color: #7fd3ff;
            font-size: var(--star-size);
            line-height: 1;
            pointer-events: none;
            z-index: 96;
            opacity: 0;
            text-shadow:
                0 0 8px rgba(127, 211, 255, 0.82),
                0 0 18px rgba(74, 174, 255, 0.46),
                0 0 30px rgba(74, 174, 255, 0.2);
            transform: translate3d(0, -40px, 0) rotate(0deg) scale(0.8);
            animation: final-star-shower var(--star-duration) ease-in forwards;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 680px;
            height: 450px;
            z-index: 10;
            perspective: 3000px;
            transform: scale(var(--book-scale, 1));
            transform-origin: center center;
        }

        /* LIVRO FECHADO */
        .book-closed {
            position: relative;
            width: 340px;
            height: 450px;
            margin: auto;
            cursor: pointer;
            transition: opacity 0.5s ease;
            transform-origin: left center;
            transform-style: preserve-3d;
            backface-visibility: hidden;
            z-index: 20;
            animation: cover-breath 5.8s ease-in-out infinite;
        }

        .book-closed img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            border-radius: 12px;
            filter: brightness(0.9);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.6);
        }

        .cover-title-shine {
            position: absolute;
            inset: 0;
            border-radius: 12px;
            overflow: hidden;
            pointer-events: none;
            z-index: 6;
            mix-blend-mode: screen;
        }

        .cover-title-shine::before {
            content: "";
            position: absolute;
            top: -16%;
            left: -70%;
            width: 56%;
            height: 132%;
            background: linear-gradient(110deg,
                    transparent 0%,
                    rgba(255, 255, 255, 0.08) 34%,
                    rgba(127, 211, 255, 0.42) 50%,
                    rgba(255, 255, 255, 0.1) 66%,
                    transparent 100%);
            filter: blur(2px);
            transform: skewX(-18deg);
            animation: cover-title-shine 4.8s ease-in-out infinite;
        }

        .open-hint {
            position: absolute;
            left: 50%;
            bottom: -54px;
            transform: translateX(-50%);
            min-width: 190px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.88);
            color: #2a1a12;
            font-family: Georgia, serif;
            font-size: 15px;
            letter-spacing: 0;
            text-align: center;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
            pointer-events: none;
            z-index: 6;
            animation: hint-pulse 1.9s ease-in-out infinite;
        }

        .book-preload-panel {
            position: absolute;
            left: 50%;
            bottom: 18px;
            width: min(286px, calc(100% - 28px));
            padding: 10px 12px 11px;
            border-radius: 8px;
            background: rgba(7, 18, 34, 0.88);
            color: #eaf8ff;
            text-align: center;
            box-shadow:
                0 16px 34px rgba(0, 0, 0, 0.34),
                inset 0 0 0 1px rgba(127, 211, 255, 0.2);
            transform: translateX(-50%);
            transition: opacity 0.25s ease, transform 0.25s ease;
            cursor: default;
            z-index: 8;
        }

        .book-closed.unlock-panel-open .book-preload-panel,
        .book-closed.unlocked .book-preload-panel,
        .book-closed.opening .book-preload-panel {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(8px);
        }

        .book-preload-button {
            width: 100%;
            border: 0;
            border-radius: 999px;
            padding: 9px 14px;
            background: linear-gradient(135deg, #eaf8ff, #8fd9ff);
            color: #102033;
            font-family: Georgia, serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(54, 168, 255, 0.26);
        }

        .book-preload-button:disabled {
            cursor: default;
            opacity: 0.82;
        }

        .book-preload-track {
            position: relative;
            height: 6px;
            margin-top: 9px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.18);
        }

        .book-preload-track span {
            position: absolute;
            inset: 0 auto 0 0;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #64c8ff, #ffffff);
            box-shadow: 0 0 14px rgba(100, 200, 255, 0.62);
            transition: width 0.22s ease;
        }

        .book-preload-status {
            min-height: 14px;
            margin-top: 7px;
            color: rgba(234, 248, 255, 0.82);
            font-size: 11px;
            line-height: 1.25;
        }

        .book-preload-panel.ready .book-preload-button {
            background: linear-gradient(135deg, #f8fdff, #b8eeff);
        }

        .book-lock-badge {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 132px;
            height: 132px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #eaf8ff;
            font-size: 86px;
            box-shadow: none;
            text-shadow:
                0 0 10px rgba(255, 223, 92, 0.9),
                0 0 24px rgba(255, 202, 64, 0.5),
                0 0 42px rgba(255, 184, 40, 0.26),
                0 0 14px rgba(127, 211, 255, 0.74),
                0 12px 22px rgba(0, 0, 0, 0.48);
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            animation: lock-float 2.4s ease-in-out infinite;
        }

        .book-chain {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 560px;
            height: 30px;
            pointer-events: none;
            z-index: 7;
            transform-origin: center;
            filter: drop-shadow(0 8px 10px rgba(0, 0, 0, 0.34));
        }

        .book-chain::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                repeating-linear-gradient(90deg,
                    rgba(225, 225, 225, 0.96) 0 6px,
                    transparent 6px 14px,
                    rgba(105, 105, 105, 0.92) 14px 20px,
                    transparent 20px 28px);
            -webkit-mask-image: radial-gradient(ellipse 10px 13px at 14px 50%, transparent 42%, #000 46% 78%, transparent 82%);
            -webkit-mask-size: 28px 30px;
            -webkit-mask-repeat: repeat-x;
            mask-image: radial-gradient(ellipse 10px 13px at 14px 50%, transparent 42%, #000 46% 78%, transparent 82%);
            mask-size: 28px 30px;
            mask-repeat: repeat-x;
            opacity: 0.94;
        }

        .book-chain.chain-a {
            transform: translate(-50%, -50%) rotate(-53deg);
        }

        .book-chain.chain-b {
            transform: translate(-50%, -50%) rotate(53deg);
        }

        .book-chain-lock-cover {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 112px;
            height: 112px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(7, 21, 39, 0.38), rgba(7, 21, 39, 0) 64%);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 8;
        }

        .book-closed.unlocking .book-lock-badge,
        .book-closed.unlocking .book-chain-lock-cover {
            animation: lock-unlock 0.95s cubic-bezier(0.16, 0.84, 0.34, 1) forwards;
        }

        .book-closed.unlocking .book-chain.chain-a {
            animation: chain-break-a 0.95s cubic-bezier(0.16, 0.84, 0.34, 1) forwards;
        }

        .book-closed.unlocking .book-chain.chain-b {
            animation: chain-break-b 0.95s cubic-bezier(0.16, 0.84, 0.34, 1) forwards;
        }

        .book-closed.unlocked:not(.unlocking) .book-lock-badge,
        .book-closed.unlocked:not(.unlocking) .book-chain,
        .book-closed.unlocked:not(.unlocking) .book-chain-lock-cover {
            opacity: 0;
            animation: none;
        }

        .book-unlock-panel {
            position: absolute;
            left: 50%;
            bottom: 28px;
            width: min(282px, calc(100% - 34px));
            padding: 14px 14px 13px;
            border-radius: 8px;
            background: rgba(8, 21, 38, 0.86);
            color: #eaf8ff;
            box-shadow:
                0 18px 40px rgba(0, 0, 0, 0.44),
                inset 0 0 0 1px rgba(127, 211, 255, 0.28);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(12px) scale(0.96);
            transition: opacity 0.28s ease, transform 0.28s ease;
            z-index: 12;
        }

        .book-unlock-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .book-closed.unlock-panel-open .book-lock-badge {
            z-index: 9;
        }

        .book-unlock-question {
            margin: 0 0 10px;
            font-size: 14px;
            line-height: 1.25;
            text-align: center;
            text-shadow: 0 0 10px rgba(127, 211, 255, 0.28);
        }

        .book-unlock-form {
            display: grid;
            grid-template-columns: 1fr 38px;
            gap: 8px;
            align-items: center;
        }

        .book-unlock-form input {
            min-width: 0;
            height: 38px;
            border: 0;
            border-radius: 6px;
            padding: 0 12px;
            background: rgba(255, 255, 255, 0.96);
            color: #102a43;
            font-family: Georgia, serif;
            font-size: 15px;
            text-align: center;
            outline: none;
            box-shadow:
                inset 0 0 0 1px rgba(127, 211, 255, 0.22),
                0 8px 18px rgba(0, 0, 0, 0.18);
        }

        .book-unlock-form input:focus {
            box-shadow: 0 0 0 3px rgba(127, 211, 255, 0.36);
        }

        .book-unlock-form input::placeholder {
            color: rgba(16, 42, 67, 0.48);
        }

        .book-unlock-form button {
            width: 38px;
            height: 38px;
            border: 0;
            border-radius: 50%;
            background: #7fd3ff;
            color: #08213a;
            cursor: pointer;
            font-size: 18px;
            line-height: 38px;
            box-shadow: 0 0 16px rgba(127, 211, 255, 0.42);
        }

        .book-unlock-feedback {
            min-height: 16px;
            margin-top: 8px;
            color: #ffd7df;
            font-size: 12px;
            line-height: 1.2;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .book-unlock-feedback.visible {
            opacity: 1;
        }

        .book-unlock-panel.key-ready .book-unlock-form {
            display: none;
        }

        .unlock-key {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 74px;
            height: 74px;
            margin: 10px auto 0;
            border-radius: 50%;
            color: #ffe28a;
            font-size: 54px;
            line-height: 1;
            cursor: grab;
            opacity: 0;
            pointer-events: none;
            text-shadow:
                0 0 10px rgba(255, 222, 110, 0.86),
                0 0 22px rgba(255, 184, 40, 0.36),
                0 8px 16px rgba(0, 0, 0, 0.42);
            transform: translateY(8px) rotate(-12deg) scale(0.88);
            transition: opacity 0.28s ease, transform 0.28s ease;
            touch-action: none;
            user-select: none;
        }

        .book-unlock-panel.key-ready .unlock-key {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) rotate(-12deg) scale(1);
            animation: key-glow 1.6s ease-in-out infinite;
        }

        .unlock-key.dragging {
            position: fixed;
            left: var(--key-x);
            top: var(--key-y);
            z-index: 140;
            cursor: grabbing;
            opacity: 1;
            pointer-events: none;
            transform: translate(-50%, -50%) rotate(-18deg) scale(1.16);
            transition: none;
            animation: none;
        }

        .book-closed.key-ready .book-lock-badge {
            animation: lock-float 2.4s ease-in-out infinite, lock-target-pulse 1.3s ease-in-out infinite;
        }

        .book-closed.wrong-answer {
            animation: cover-breath 5.8s ease-in-out infinite, lock-wrong 0.34s ease;
        }

        .book-closed::before {
            content: "";
            position: absolute;
            top: 0;
            left: -10px;
            width: 58px;
            height: 100%;
            border-radius: 16px 5px 5px 16px;
            background:
                linear-gradient(to right,
                    #3d5c85 0%,
                    #2c4172 18%,
                    #3e407d 42%,
                    #224987 70%,
                    rgba(93, 74, 236, 0.55) 100%),
                repeating-linear-gradient(180deg,
                    rgba(255, 255, 255, 0.045),
                    rgba(255, 255, 255, 0.045) 3px,
                    rgba(0, 0, 0, 0.16) 3px,
                    rgba(0, 0, 0, 0.16) 12px);
            box-shadow:
                inset -50px 0 40px rgba(0, 0, 0, 0.72),
                inset 7px 0 14px rgba(255, 255, 255, 0.06),
                10px 0 18px rgba(0, 0, 0, 0.34),
                0 15px 38px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 3;
        }

        .book-closed::after {
            content: "";
            position: absolute;
            top: 8px;
            left: 26px;
            width: 11px;
            height: calc(100% - 16px);
            border-radius: 8px;
            background: linear-gradient(to right,
                    rgba(0, 0, 0, 0.72),
                    rgba(255, 255, 255, 0.08),
                    rgba(0, 0, 0, 0.42));
            pointer-events: none;
            z-index: 4;
        }

        .book-closed.hidden {
            opacity: 0;
            pointer-events: none;
            animation: none;
        }

        .book-closed.opening {
            pointer-events: none;
            animation: openCover 1.15s cubic-bezier(0.2, 0.75, 0.2, 1) forwards;
        }

        /* LIVRO ABERTO */
        .book-open {
            position: absolute;
            width: 680px;
            height: 450px;
            display: flex;
            perspective: 2500px;
            transform-style: preserve-3d;
            transform-origin: center center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease 0.3s;
            filter: drop-shadow(0 28px 42px rgba(0, 0, 0, 0.34)) brightness(0.9);
        }

        .book-open.visible {
            opacity: 1;
            pointer-events: all;
        }

        .book-open.opening {
            pointer-events: none;
            animation: revealOpenBook 1.15s cubic-bezier(0.2, 0.75, 0.2, 1) forwards;
        }

        .book-open,
        .page {
            touch-action: none;
        }

        .close-book {
            position: absolute;
            top: -42px;
            right: 0;
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            color: #2a1a12;
            cursor: pointer;
            font-size: 24px;
            line-height: 34px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }

        .close-book:hover {
            background: #ffffff;
        }

        .temp-jump-page {
            position: absolute;
            top: -42px;
            left: 0;
            height: 34px;
            border: 0;
            border-radius: 999px;
            padding: 0 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #2a1a12;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 34px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            z-index: 60;
        }

        .temp-jump-page:hover {
            background: #ffffff;
        }

        .hide-book-button {
            position: absolute;
            top: -42px;
            left: 50%;
            height: 34px;
            border: 0;
            border-radius: 999px;
            padding: 0 14px;
            background: rgba(255, 255, 255, 0.9);
            color: #123d70;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 14px;
            line-height: 34px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(6px);
            transition: opacity 0.35s ease, transform 0.35s ease, background 0.2s ease;
            z-index: 60;
        }

        .hide-book-button:hover {
            background: #ffffff;
        }

        .book-open.back-cover-centered .hide-book-button {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .book-hidden-scene .container {
            opacity: 0;
            pointer-events: none;
            transform: scale(var(--book-scale, 1)) translateY(18px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .book-hidden-scene .falling-sky {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .hidden-book-heart {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.86);
            transition: opacity 0.7s ease, transform 0.9s cubic-bezier(0.18, 0.78, 0.22, 1);
            z-index: 115;
        }

        .book-hidden-scene .hidden-book-heart {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .hidden-book-heart button {
            position: absolute;
            left: 50%;
            bottom: 34px;
            transform: translateX(-50%);
            border: 0;
            border-radius: 999px;
            padding: 9px 18px;
            background: rgba(7, 21, 39, 0.72);
            color: #bfe8ff;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 14px;
            box-shadow:
                0 0 18px rgba(74, 174, 255, 0.2),
                inset 0 0 0 1px rgba(127, 211, 255, 0.24);
        }

        .hidden-heart-center-text {
            position: absolute;
            left: 50%;
            top: 50%;
            width: min(320px, 78vw);
            color: #bfe8ff;
            text-align: center;
            transform: translate(-50%, -50%) scale(0.92);
            opacity: 0;
            pointer-events: none;
            text-shadow:
                0 0 8px rgba(127, 211, 255, 0.84),
                0 0 22px rgba(74, 174, 255, 0.44),
                0 0 40px rgba(74, 174, 255, 0.22);
            transition: opacity 0.8s ease 0.75s, transform 0.8s ease 0.75s;
        }

        .book-hidden-scene .hidden-heart-center-text {

        .page::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.24) 48%,
                    rgba(0, 0, 0, 0.12) 82%,
                    rgba(255, 255, 255, 0) 100%);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            border-radius: 0 12px 12px 0;
        }

        /* Sombra constante na dobra (lombada) */
        .page::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(to right,
                    rgba(0, 0, 0, 0.18) 0%,
                    rgba(0, 0, 0, 0.08) 12%,
                    rgba(255, 255, 255, 0) 36%);
            opacity: 0.28;
            pointer-events: none;
            z-index: 10;
            border-radius: 0 12px 12px 0;
        }

        /* Sombra projetada na página de baixo */
        .page-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at left,
                    rgba(0, 0, 0, 0.32) 0%,
                    rgba(0, 0, 0, 0.16) 34%,
                    rgba(0, 0, 0, 0) 72%);
            opacity: 0;
            pointer-events: none;
            z-index: 15;
            border-radius: 0 12px 12px 0;
        }

        /* Quando a página anterior está virando, a sombra aparece nesta */
        .page.flipping-forward+.page .page-shadow {
            animation: shadow-reveal 0.9s ease;
        }

        .page.flipping-backward+.page .page-shadow {
            animation: shadow-reveal 0.9s ease;
        }

        /* IMAGEM */
        .page img {
            width: 100%;
            height: 100%;
            border-radius: 0 12px 12px 0;
            box-shadow: 8px 0 25px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .page-face.front img {
            border-radius: 0 12px 12px 0;
            box-shadow: 8px 0 25px rgba(0, 0, 0, 0.4);
        }

        .page-face.back img {
            border-radius: 12px 0 0 12px;
            box-shadow: -8px 0 25px rgba(0, 0, 0, 0.32);
        }

        .page .page-face img[class],
        .page .page-face video {
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }

        .page .page-face img.page-9-rain-gif {
            position: absolute;
            left: 50%;
            bottom: 12px;
            height: 34%;
            width: 45%;
            max-height: none;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            transform: translateX(-50%);
            opacity: 0.72;
            z-index: 30;
        }

        .page .page-face img.page-28-gif {
            position: absolute;
            left: 50%;
            bottom: 14px;
            width: 158px;
            height: auto;
            max-height: 150px;
            object-fit: contain;
            transform: translateX(-50%);
            opacity: 0.86;
            z-index: 30;
        }

        .page .page-face img.page-51-coco-gif {
            position: absolute;
            left: 50%;
            bottom: 8px;
            width: 42%;
            height: auto;
            max-height: 20%;
            object-fit: contain;
            transform: translateX(-50%);
            opacity: 0.88;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            mix-blend-mode: darken;
            filter: saturate(0.82) contrast(1.06) brightness(1.02);
            z-index: 30;
        }

        .page .page-face img.page-33-laugh-gif {
            position: absolute;
            left: 50%;
            bottom: 10px;
            width: 46%;
            height: auto;
            max-height: 24%;
            object-fit: contain;
            transform: translateX(-50%);
            opacity: 0.94;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
            mix-blend-mode: multiply;
            filter: contrast(1.06) brightness(1.02);
            z-index: 30;
        }

        .page .page-face img.final-blank-gif-top {
            width: 82%;
            height: auto;
            max-height: 46%;
            object-fit: contain;
            opacity: 0.82;
        }

        .page .page-face .letter-card-image {
            width: 100%;
            height: auto;
            max-height: 330px;
            object-fit: contain;
            border-radius: 6px;
        }

        .page .page-face.front img.page-right-daisy-image {
            position: absolute;
            right: -84px;
            top: -10px;
            width: 76%;
            height: auto;
            max-height: 70%;
            object-fit: contain;
            opacity: 0.92;
            border-radius: 0;
            box-shadow: none;
            filter: none;
            mix-blend-mode: normal;
            background: transparent;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
            z-index: 30;
        }

        .right-daisy-burst {
            position: absolute;
            right: -84px;
            top: -10px;
            width: 76%;
            height: 70%;
            pointer-events: none;
            z-index: 31;
            overflow: visible;
        }

        .right-daisy-mini {
            position: absolute;
            left: 50%;
            top: 24%;
            color: var(--mini-daisy-color);
            font-size: var(--mini-daisy-size);
            line-height: 1;
            opacity: 0;
            text-shadow:
                0 0 4px rgba(255, 255, 255, 0.92),
                0 0 10px rgba(74, 174, 255, 0.32);
            transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
        }

        .page.daisy-burst-active .right-daisy-mini {
            animation: right-daisy-fall var(--mini-daisy-duration) ease-in-out var(--mini-daisy-delay) forwards;
        }

        .page.back-cover .page-face.back {
            background:
                linear-gradient(to right,
                    #0b0705 0%,
                    #2a1b13 14%,
                    #49372b 38%,
                    #1d120c 100%);
            box-shadow:
                inset 0 0 0 5px rgba(12, 7, 5, 0.78),
                inset 16px 0 22px rgba(255, 255, 255, 0.08),
                inset -38px 0 46px rgba(0, 0, 0, 0.5),
                -12px 0 34px rgba(0, 0, 0, 0.58);
        }

        .page.back-cover img {
            filter: saturate(0.82) contrast(1.12) brightness(0.78);
        }

        .page.back-cover .page-face.front img {
            border-radius: 0 14px 14px 0;
            box-shadow:
                inset 0 0 0 2px rgba(10, 6, 4, 0.42),
                12px 0 34px rgba(0, 0, 0, 0.52);
        }

        .page.back-cover .page-face.back img {
            width: calc(100% - 14px);
            height: calc(100% - 14px);
            border-radius: 10px 0 0 10px;
            box-shadow:
                inset 0 0 0 3px rgba(10, 6, 4, 0.72),
                inset -28px 0 38px rgba(0, 0, 0, 0.34),
                -12px 0 34px rgba(0, 0, 0, 0.52);
        }

        .page.back-cover .page-face.back::before {
            content: "";
            position: absolute;
            top: 0;
            left: -10px;
            width: 58px;
            height: 100%;
            border-radius: 16px 5px 5px 16px;
            background:
                linear-gradient(to right,
                    #3d5c85 0%,
                    #2c4172 18%,
                    #3e407d 42%,
                    #224987 70%,
                    rgba(93, 74, 236, 0.55) 100%),
                repeating-linear-gradient(180deg,
                    rgba(255, 255, 255, 0.045),
                    rgba(255, 255, 255, 0.045) 3px,
                    rgba(0, 0, 0, 0.16) 3px,
                    rgba(0, 0, 0, 0.16) 12px);
            box-shadow:
                inset -50px 0 40px rgba(0, 0, 0, 0.72),
                inset 7px 0 14px rgba(255, 255, 255, 0.06),
                10px 0 18px rgba(0, 0, 0, 0.34),
                0 15px 38px rgba(0, 0, 0, 0.5);
            z-index: 12;
            pointer-events: none;
        }

        .page.back-cover .page-face.back::after {
            content: "";
            position: absolute;
            top: 8px;
            left: 26px;
            width: 11px;
            height: calc(100% - 16px);
            border-radius: 8px;
            background: linear-gradient(to right,
                    rgba(0, 0, 0, 0.72),
                    rgba(255, 255, 255, 0.08),
                    rgba(0, 0, 0, 0.42));
            z-index: 13;
            pointer-events: none;
        }

        /* VIRAR PÁGINA */
        .flipped {
            transform: rotateY(-180deg);
        }

        /* Animação de Curvatura (Indo) */
        .flipping-forward {
            animation: flip-curl-forward 0.9s ease-in-out forwards;
        }

        /* Animação de Curvatura (Voltando) */
        .flipping-backward {
            animation: flip-curl-backward 0.9s ease-in-out forwards;
        }

        .flipping-forward::after,
        .flipping-backward::after {
            animation: page-glare 0.9s ease forwards;
        }

        @keyframes flip-curl-forward {
            0% {
                transform: rotateY(0deg) skewY(0deg);
            }

            35% {
                transform: rotateY(-68deg) skewY(-2deg);
            }

            68% {
                transform: rotateY(-132deg) skewY(-1deg);
            }

            100% {
                transform: rotateY(-180deg) skewY(0deg);
            }
        }

        @keyframes flip-curl-backward {
            0% {
                transform: rotateY(-180deg) skewY(0deg);
            }

            35% {
                transform: rotateY(-112deg) skewY(2deg);
            }

            68% {
                transform: rotateY(-48deg) skewY(1deg);
            }

            100% {
                transform: rotateY(0deg) skewY(0deg);
            }
        }

        @keyframes shadow-reveal {
            0% {
                opacity: 0;
            }

            30% {
                opacity: 0.5;
            }

            62% {
                opacity: 0.24;
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes page-glare {
            0% {
                opacity: 0;
                transform: translateX(-35%);
            }

            36% {
                opacity: 0.45;
            }

            70% {
                opacity: 0.22;
            }

            100% {
                opacity: 0;
                transform: translateX(28%);
            }
        }

        @keyframes page28-heart-rise {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0) scale(0.72) rotate(0deg);
            }

            14% {
                opacity: var(--heart-opacity);
            }

            78% {
                opacity: var(--heart-opacity);
            }

            100% {
                opacity: 0;
                transform: translate3d(var(--heart-drift), -230px, 0) scale(1.18) rotate(var(--heart-spin));
            }
        }

        @keyframes page41-flower-float {
            0% {
                opacity: 0;
                transform: translate3d(0, 0, 0) scale(0.68) rotate(0deg);
            }

            12% {
                opacity: var(--flower-opacity);
            }

            72% {
                opacity: var(--flower-opacity);
            }

            100% {
                opacity: 0;
                transform: translate3d(var(--flower-drift), -260px, 0) scale(1.22) rotate(var(--flower-spin));
            }
        }

        @keyframes right-daisy-fall {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.45) rotate(0deg);
            }

            10% {
                opacity: var(--mini-daisy-opacity);
                transform: translate(calc(-50% + var(--mini-daisy-sway)), calc(-50% + 34px)) scale(0.86) rotate(calc(var(--mini-daisy-spin) * 0.16));
            }

            34% {
                opacity: var(--mini-daisy-opacity);
                transform: translate(calc(-50% - var(--mini-daisy-sway)), calc(-50% + (var(--mini-daisy-y) * 0.34))) scale(0.98) rotate(calc(var(--mini-daisy-spin) * -0.36));
            }

            62% {
                opacity: var(--mini-daisy-opacity);
                transform: translate(calc(-50% + (var(--mini-daisy-x) * 0.45) + var(--mini-daisy-sway)), calc(-50% + (var(--mini-daisy-y) * 0.66))) scale(1.05) rotate(calc(var(--mini-daisy-spin) * 0.62));
            }

            84% {
                opacity: calc(var(--mini-daisy-opacity) * 0.82);
                transform: translate(calc(-50% + (var(--mini-daisy-x) * 0.78) - var(--mini-daisy-sway)), calc(-50% + (var(--mini-daisy-y) * 0.86))) scale(1.02) rotate(calc(var(--mini-daisy-spin) * -0.78));
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--mini-daisy-x)), calc(-50% + var(--mini-daisy-y))) scale(1.02) rotate(var(--mini-daisy-spin));
            }
        }

        @keyframes hint-pulse {

            0%,
            100% {
                opacity: 0.74;
                transform: translateX(-50%) translateY(0);
            }

            50% {
                opacity: 1;
                transform: translateX(-50%) translateY(-4px);
            }
        }

        @keyframes cover-title-shine {

            0%,
            42% {
                left: -70%;
                opacity: 0;
            }

            52% {
                opacity: 0.95;
            }

            72%,
            100% {
                left: 122%;
                opacity: 0;
            }
        }

        @keyframes cover-breath {

            0%,
            100% {
                transform: translateY(0) scale(1);
                filter: brightness(1);
            }

            50% {
                transform: translateY(-2px) scale(1.006);
                filter: brightness(1.025);
            }
        }

        @keyframes lock-float {

            0%,
            100% {
                transform: translate(-50%, -50%) translateY(0) rotate(0deg);
            }

            50% {
                transform: translate(-50%, -50%) translateY(-6px) rotate(2deg);
            }
        }

        @keyframes key-glow {

            0%,
            100% {
                filter: brightness(1);
            }

            50% {
                filter: brightness(1.35);
            }
        }

        @keyframes lock-target-pulse {

            0%,
            100% {
                text-shadow:
                    0 0 10px rgba(255, 223, 92, 0.9),
                    0 0 24px rgba(255, 202, 64, 0.5),
                    0 0 42px rgba(255, 184, 40, 0.26),
                    0 0 14px rgba(127, 211, 255, 0.74),
                    0 12px 22px rgba(0, 0, 0, 0.48);
            }

            50% {
                text-shadow:
                    0 0 16px rgba(255, 231, 126, 1),
                    0 0 34px rgba(255, 202, 64, 0.74),
                    0 0 58px rgba(255, 184, 40, 0.38),
                    0 0 18px rgba(127, 211, 255, 0.82),
                    0 12px 22px rgba(0, 0, 0, 0.48);
            }
        }

        @keyframes lock-unlock {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1) rotate(0deg);
                filter: brightness(1);
            }

            24% {
                transform: translate(-50%, -50%) scale(1.08) rotate(-8deg);
                filter: brightness(1.25);
            }

            48% {
                transform: translate(-50%, -50%) scale(1.08) rotate(8deg);
            }

            72% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.18) rotate(-4deg);
                filter: brightness(1.55);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -86%) scale(0.35) rotate(22deg);
                filter: brightness(1.8);
            }
        }

        @keyframes chain-break-a {
            0% {
                opacity: 0.94;
                transform: translate(-50%, -50%) rotate(-53deg) scale(1);
                filter: brightness(1);
            }

            42% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(-44deg) scale(1.03);
                filter: brightness(1.35);
            }

            100% {
                opacity: 0;
                transform: translate(-76%, -82%) rotate(-64deg) scale(0.72);
                filter: brightness(1.8);
            }
        }

        @keyframes chain-break-b {
            0% {
                opacity: 0.94;
                transform: translate(-50%, -50%) rotate(53deg) scale(1);
                filter: brightness(1);
            }

            42% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(44deg) scale(1.03);
                filter: brightness(1.35);
            }

            100% {
                opacity: 0;
                transform: translate(-24%, -82%) rotate(64deg) scale(0.72);
                filter: brightness(1.8);
            }
        }

        @keyframes lock-wrong {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-5px);
            }
        }

        @keyframes heart-beat {

            0%,
            100% {
                transform: translate(-50%, -50%) rotate(-45deg) scale(1);
                opacity: 0.68;
            }

            45% {
                transform: translate(-50%, -50%) rotate(-45deg) scale(1.16);
                opacity: 0.92;
            }

            68% {
                transform: translate(-50%, -50%) rotate(-45deg) scale(0.96);
                opacity: 0.76;
            }
        }

        @keyframes emoji-fall {
            0% {
                transform: translate3d(0, -80px, 0) rotate(0deg);
            }

            100% {
                transform: translate3d(var(--drift-x), calc(100vh + 100px), 0) rotate(var(--spin));
            }
        }

        @keyframes constellation-twinkle {

            0%,
            100% {
                opacity: 0.34;
                transform: scale(0.82);
            }

            50% {
                opacity: 1;
                transform: scale(1.25);
            }
        }

        @keyframes moon-trail-fade {
            0% {
                opacity: 0.82;
                transform: translate(-50%, -50%) scale(0.68) rotate(-12deg);
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--trail-drift-x)), calc(-50% + var(--trail-drift-y))) scale(1.25) rotate(16deg);
            }
        }

        @keyframes page-magic-dust {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
            }

            18% {
                opacity: var(--dust-opacity);
            }

            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--dust-x)), calc(-50% + var(--dust-y))) scale(1.25) rotate(var(--dust-spin));
            }
        }

        @keyframes page-9-raindrop-fall {
            0% {
                opacity: 0;
                transform: translateY(-18px) rotate(9deg);
            }

            10% {
                opacity: var(--drop-opacity);
            }

            88% {
                opacity: var(--drop-opacity);
            }

            100% {
                opacity: 0;
                transform: translateY(128px) rotate(9deg);
            }
        }

        @keyframes final-star-shower {
            0% {
                opacity: 0;
                transform: translate3d(0, -40px, 0) rotate(0deg) scale(0.72);
            }

            12% {
                opacity: var(--star-opacity);
            }

            72% {
                opacity: var(--star-opacity);
            }

            100% {
                opacity: 0;
                transform: translate3d(var(--star-drift), 112vh, 0) rotate(var(--star-spin)) scale(1.08);
            }
        }

        @keyframes hidden-heart-symbol-arrive {
            0% {
                opacity: 0;
                transform: translate(var(--heart-start-x), var(--heart-start-y)) scale(0.35) rotate(var(--heart-start-rotate));
            }

            72% {
                opacity: var(--heart-opacity);
            }

            100% {
                opacity: var(--heart-opacity);
                transform: translate(calc(-50% + var(--heart-x)), calc(-50% + var(--heart-y))) scale(1) rotate(var(--heart-rotate));
            }
        }

        @keyframes hidden-heart-symbol-glow {

            0%,
            100% {
                filter: brightness(0.96);
            }

            50% {
                filter: brightness(1.45);
            }
        }

        @media (max-width: 760px) {
            .page-nav.prev {
                left: 8px;
            }

            .page-nav.next {
                right: 8px;
            }
        }

        @keyframes openCover {
            0% {
                opacity: 1;
                transform: translateX(0) rotateY(0deg);
            }

            25% {
                opacity: 1;
                transform: translateX(170px) rotateY(0deg);
            }

            100% {
                opacity: 0;
                transform: translateX(170px) rotateY(-180deg);
            }
        }

        @keyframes revealOpenBook {
            0% {
                opacity: 0;
                transform: scaleX(0.5);
            }

            25% {
                opacity: 0;
                transform: scaleX(0.5);
            }

            100% {
                opacity: 1;
                transform: scaleX(1);
            }
        }
    </style>
</head>

<body>

    <div class="falling-sky" id="fallingSky" aria-hidden="true"></div>
    <div class="heart-constellation" id="heartConstellation" aria-hidden="true"></div>
    <div class="hidden-book-heart" id="hiddenBookHeart" aria-hidden="true">
        <div class="hidden-heart-center-text" aria-hidden="true">
            <span class="hidden-heart-date">05/01/2026</span>
            <span class="hidden-heart-phrase">Essa data que nunca irei esquecer</span>
        </div>
        <button type="button" onclick="showBookAgain(event)" aria-label="Mostrar livro novamente">Mostrar livro</button>
    </div>

    <div class="container">

        <!-- LIVRO FECHADO (capa) -->
        <div class="book-closed" id="bookClosed" onclick="requestBookUnlock(event)">
            <img src="imagens/capa.png" alt="Clique para abrir o livro">
            <div class="cover-title-shine" aria-hidden="true"></div>
            <div class="book-chain chain-a" aria-hidden="true"></div>
            <div class="book-chain chain-b" aria-hidden="true"></div>
            <div class="book-chain-lock-cover" aria-hidden="true"></div>
            <div class="book-lock-badge" aria-hidden="true">🔒</div>
            <div class="book-unlock-panel" id="bookUnlockPanel" onclick="event.stopPropagation()">
                <p class="book-unlock-question">Qual o dia que eu te disse meu primeiro eu te amo?</p>
                <form class="book-unlock-form" onsubmit="submitBookUnlock(event)">
                    <input id="bookUnlockDate" type="text" inputmode="numeric" autocomplete="off"
                        placeholder="dd/mm/aaaa" maxlength="10" aria-label="Data do primeiro eu te amo">
                    <button type="submit" aria-label="Desbloquear livro">✓</button>
                </form>
                <div class="book-unlock-feedback" id="bookUnlockFeedback">Tenta lembrar com carinho...</div>
                <div class="unlock-key" id="bookUnlockKey" role="button" aria-label="Chave para abrir o cadeado"
                    onpointerdown="startUnlockKeyDrag(event)">🔑</div>
            </div>
            <div class="book-preload-panel" id="bookPreloadPanel" onclick="event.stopPropagation()">
                <button class="book-preload-button" id="bookPreloadButton" type="button"
                    onclick="preloadFullBook(event)">Baixar livro antes</button>
                <div class="book-preload-track" aria-hidden="true"><span id="bookPreloadBar"></span></div>
                <div class="book-preload-status" id="bookPreloadStatus">Bom para abrir no celular sem travar tanto.
                </div>
            </div>
            <div class="open-hint">Toque no cadeado</div>
        </div>

        <!-- LIVRO ABERTO -->
        <div class="book-open" id="bookOpen">

            <button class="close-book" type="button" onclick="closeBook()" aria-label="Voltar para a capa"
                title="Voltar para a capa">&times;</button>
            <button class="temp-jump-page" type="button" onclick="jumpToPenultimatePage()"

        function resetInitialBookLock() {

        function formatUnlockDate(value) {
            const digits = value.replace(/\D/g, '').slice(0, 8);
            const day = digits.slice(0, 2);

            const year = digits.slice(4, 8);

            if (digits.length <= 2) return day;
            if (digits.length <= 4) return `${day}/${month}`;
            return `${day}/${month}/${year}`;

        function resizeBook() {
            const viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
            const viewportHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const availableWidth = Math.max(280, viewportWidth - 24);
            const availableHeight = Math.max(320, viewportHeight - 24);
            const scale = Math.min(1, availableWidth / BOOK_WIDTH, availableHeight / BOOK_HEIGHT);

            bookContainer.style.setProperty('--book-scale', scale.toFixed(3));

        function shiftedPage(originalPageNumber) {
            return originalPageNumber >= INSERT_AT_PAGE ? originalPageNumber + INSERTED_PAGE_IMAGES.length : originalPageNumber;
        }

        function pageImageSrc(pageNumber) {
            if (pageNumber >= INSERT_AT_PAGE && pageNumber < INSERT_AT_PAGE + INSERTED_PAGE_IMAGES.length) {
                return INSERTED_PAGE_IMAGES[pageNumber - INSERT_AT_PAGE];
            }

            const originalPageNumber = pageNumber >= INSERT_AT_PAGE + INSERTED_PAGE_IMAGES.length
                ? pageNumber - INSERTED_PAGE_IMAGES.length
                : pageNumber;

            return `imagens/p${originalPageNumber}.png`;
        }

        function createPageImage(pageNumber) {
            if (!pageNumber) return '';

            const src = pageImageSrc(pageNumber);
            const eager = pageNumber <= 3;
            const srcAttr = eager ? ` src="${src}"` : '';
            return `<img data-page-image data-page="${pageNumber}" data-src="${src}"${srcAttr} loading="${pageNumber > 5 ? 'lazy' : 'eager'}" decoding="async">`;
        }

        function createLazyPageMedia(pageNumber, tagName, className, src, attributes) {
            const extraAttributes = attributes ? ` ${attributes}` : '';

            if (tagName === 'video') {
                return `<video class="${className}" data-page-media data-page="${pageNumber}" data-src="${src}"${extraAttributes}></video>`;
            }

            return `<img class="${className}" data-page-media data-page="${pageNumber}" data-src="${src}" alt="" loading="lazy"${extraAttributes}>`;
        }

        function hydrateNearbyPageAssets() {
            const centerPage = current === 0 ? 1 : current * 2;
            const minPage = Math.max(1, centerPage - 6);
            const maxPage = Math.min(TOTAL_PAGES, centerPage + 8);
            const minMediaPage = Math.max(1, centerPage - 2);
            const maxMediaPage = Math.min(TOTAL_PAGES, centerPage + 4);

            document.querySelectorAll('[data-page-image]').forEach(function (img) {
                const pageNumber = Number(img.dataset.page || 0);
                const shouldLoad = pageNumber >= minPage && pageNumber <= maxPage;

                if (shouldLoad && !img.getAttribute('src')) {
                    img.src = img.dataset.src;
                }
            });

            document.querySelectorAll('[data-page-media]').forEach(function (media) {
                const pageNumber = Number(media.dataset.page || 0);
                const shouldLoad = pageNumber >= minMediaPage && pageNumber <= maxMediaPage;

                if (shouldLoad && !media.getAttribute('src')) {
                    media.src = media.dataset.src;
                    if (media.tagName === 'VIDEO') {
                        media.load();
                        media.play().catch(function () { });
                    }
                } else if (!shouldLoad && media.getAttribute('src')) {
                    if (media.tagName === 'VIDEO') {
                        media.pause();
                    }
                    media.removeAttribute('src');
                    if (media.tagName === 'VIDEO') {
                        media.load();
                    }
                }
            });
        }

        function preloadPageImage(pageNumber) {
            if (!pageNumber || pageNumber < 1 || pageNumber > TOTAL_PAGES || preloadedPages.has(pageNumber)) return;

            preloadedPages.add(pageNumber);
            const img = new Image();
            img.src = pageImageSrc(pageNumber);
        }

        function preloadNearbyPages() {
            const centerPage = current === 0 ? 1 : current * 2;
            const pagesToPreload = [
                centerPage - 3,
                centerPage - 2,
                centerPage - 1,
                centerPage,
                centerPage + 1,
                centerPage + 2,
                centerPage + 3,
                centerPage + 4
            ];

            pagesToPreload.forEach(preloadPageImage);
            hydrateNearbyPageAssets();
        }

        function getAssetKind(src) {
            const cleanSrc = src.split('?')[0].toLowerCase();
            return /\.(mp4|webm|mov|m4v)$/.test(cleanSrc) ? 'video' : 'image';
        }

        function addFullBookPreloadAsset(assets, src, type) {
            if (!src) return;

            const cleanSrc = src.trim();
            if (!cleanSrc || cleanSrc.startsWith('data:')) return;

            if (!assets.has(cleanSrc)) {
                assets.set(cleanSrc, {
                    src: cleanSrc,
                    type: type || getAssetKind(cleanSrc)
                });
            }
        }

        function getFullBookPreloadAssets() {
            const assets = new Map();

            addFullBookPreloadAsset(assets, 'index.html', 'document');
            addFullBookPreloadAsset(assets, 'manifest.webmanifest', 'document');
            addFullBookPreloadAsset(assets, 'sw.js', 'document');
            addFullBookPreloadAsset(assets, 'icons/icon-192.png', 'image');
            addFullBookPreloadAsset(assets, 'icons/icon-512.png', 'image');
            addFullBookPreloadAsset(assets, 'imagens/capa.png', 'image');
            addFullBookPreloadAsset(assets, 'imagens/imagemfundo.jpg', 'image');

            for (let pageNumber = 1; pageNumber <= TOTAL_PAGES; pageNumber++) {
                addFullBookPreloadAsset(assets, pageImageSrc(pageNumber), 'image');
            }

            document.querySelectorAll('img[src], img[data-src]').forEach(function (img) {
                addFullBookPreloadAsset(assets, img.getAttribute('src'), 'image');
                addFullBookPreloadAsset(assets, img.dataset ? img.dataset.src : '', 'image');
            });

            document.querySelectorAll('video[src], video[data-src]').forEach(function (video) {
                addFullBookPreloadAsset(assets, video.getAttribute('src'), 'video');
                addFullBookPreloadAsset(assets, video.dataset ? video.dataset.src : '', 'video');
            });

            return Array.from(assets.values());
        }

        function canUsePwaCache() {
            return location.protocol !== 'file:' && 'caches' in window;
        }

        function getAbsoluteAssetUrl(src) {
            return new URL(src, window.location.href).href;
        }

        async function cacheBookAsset(src) {
            if (!canUsePwaCache()) return;

            try {
                const cache = await caches.open(PWA_CACHE_NAME);
                const url = getAbsoluteAssetUrl(src);
                const response = await fetch(url, { cache: 'reload' });

                if (response && (response.ok || response.type === 'opaque')) {
                    await cache.put(url, response.clone());
                }
            } catch (error) {
                // O preload visual continua mesmo se algum item nao puder entrar no cache.
            }
        }

        function preloadImageAsset(src) {
            return new Promise(function (resolve) {
                const img = new Image();

                img.onload = function () {
                    resolve(src);
                };

                img.onerror = function () {
                    resolve(src);
                };

                img.src = src;

                if (img.complete) {
                    resolve(src);
                }
            });
        }

        function preloadVideoAsset(src) {
            return new Promise(function (resolve) {
                const video = document.createElement('video');
                let settled = false;

                function finish() {
                    if (settled) return;

                    settled = true;
                    video.pause();
                    video.removeAttribute('src');
                    video.load();
                    resolve(src);
                }

                video.preload = 'auto';
                video.muted = true;
                video.playsInline = true;
                video.addEventListener('canplaythrough', finish, { once: true });
                video.addEventListener('loadeddata', finish, { once: true });
                video.addEventListener('error', finish, { once: true });
                video.src = src;
                video.load();

                window.setTimeout(finish, 7000);
            });
        }

        function preloadFileAsset(src) {
            if (location.protocol === 'file:') {
                return Promise.resolve(src);
            }

            return fetch(src)
                .then(function () {
                    return src;
                })
                .catch(function () {
                    return src;
                });
        }

        function updateFullBookPreloadProgress(loaded, total) {
            const percent = total ? Math.round((loaded / total) * 100) : 100;

            if (bookPreloadBar) {
                bookPreloadBar.style.width = `${percent}%`;
            }

            if (bookPreloadStatus) {
                bookPreloadStatus.textContent = `Baixando ${loaded}/${total} arquivos... ${percent}%`;
            }
        }

        async function preloadAssetQueue(assets, onProgress) {
            let loaded = 0;
            let index = 0;
            const workersCount = Math.min(4, Math.max(1, assets.length));

            async function worker() {
                while (index < assets.length) {
                    const asset = assets[index++];

                    if (asset.type === 'video') {
                        await preloadVideoAsset(asset.src);
                    } else if (asset.type === 'document') {
                        await preloadFileAsset(asset.src);
                    } else {
                        await preloadImageAsset(asset.src);
                    }

                    await cacheBookAsset(asset.src);

                    loaded++;
                    onProgress(loaded, assets.length);
                    await new Promise(function (resolve) {
                        window.setTimeout(resolve, 18);
                    });
                }
            }

            await Promise.all(Array.from({ length: workersCount }, worker));
        }

        function keepAllBookPagesLoaded() {
            document.querySelectorAll('[data-page-image]').forEach(function (img) {
                const src = img.dataset ? img.dataset.src : '';

                if (src && !img.getAttribute('src')) {
                    img.loading = 'eager';
                    img.src = src;
                }
            });

            for (let pageNumber = 1; pageNumber <= TOTAL_PAGES; pageNumber++) {
                preloadedPages.add(pageNumber);
            }
        }

        function preloadFullBook(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }

            if (fullBookPreloadComplete) {
                if (bookPreloadStatus) {
                    bookPreloadStatus.textContent = 'Pronto! Agora toque no cadeado.';
                }
                return fullBookPreloadPromise;
            }

            if (fullBookPreloadStarted && fullBookPreloadPromise) {
                return fullBookPreloadPromise;
            }

            const assets = getFullBookPreloadAssets();
            fullBookPreloadStarted = true;

            if (bookPreloadPanel) {
                bookPreloadPanel.classList.remove('ready');
            }

            if (bookPreloadButton) {
                bookPreloadButton.disabled = true;
                bookPreloadButton.textContent = 'Baixando...';
            }

            if (!canUsePwaCache() && bookPreloadStatus) {
                bookPreloadStatus.textContent = 'Carregando para esta abertura...';
            }

            updateFullBookPreloadProgress(0, assets.length);

            fullBookPreloadPromise = preloadAssetQueue(assets, updateFullBookPreloadProgress)
                .then(function () {
                    fullBookPreloadComplete = true;
                    keepAllBookPagesLoaded();

                    if (bookPreloadPanel) {
                        bookPreloadPanel.classList.add('ready');
                    }

                    if (bookPreloadButton) {
                        bookPreloadButton.textContent = 'Livro pronto';
                    }

                    if (bookPreloadStatus) {
                        bookPreloadStatus.textContent = canUsePwaCache()
                            ? 'Pronto! Livro salvo no app.'
                            : 'Pronto nesta abertura. Para instalar, abra por servidor/link.';
                    }
                })
                .catch(function () {
                    fullBookPreloadStarted = false;

                    if (bookPreloadButton) {
                        bookPreloadButton.disabled = false;
                        bookPreloadButton.textContent = 'Tentar baixar de novo';
                    }

                    if (bookPreloadStatus) {
                        bookPreloadStatus.textContent = 'Nao consegui baixar tudo. Tente novamente.';
                    }
                });

            return fullBookPreloadPromise;
        }

        function stopHeartSound(immediate) {
            if (!heartSound) return;

            clearInterval(heartFadeTimer);
            heartFadeTimer = null;

            if (immediate || heartSound.paused) {
                heartSound.pause();
                heartSound.currentTime = 0;
                heartSound.volume = HEART_VOLUME;
                return;
            }

            const startVolume = heartSound.volume || HEART_VOLUME;
            const steps = 18;
            let step = 0;

            heartFadeTimer = setInterval(function () {
                step++;
                const nextVolume = Math.max(0, startVolume * (1 - (step / steps)));
                heartSound.volume = nextVolume;

                if (step >= steps) {
                    clearInterval(heartFadeTimer);
                    heartFadeTimer = null;
                    heartSound.pause();
                    heartSound.currentTime = 0;
                    heartSound.volume = HEART_VOLUME;
                }
            }, 65);
        }

            if (!bookOpened || e.touches.length !== 1 || isCloseButton(e.target)) return;
            lastTouchTime = Date.now();
            startDrag(e.touches[0].clientX, e.touches[0].clientY);
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchmove', function (e) {
            if (e.touches.length === 1) {
                spawnMoonTrail(e.touches[0].clientX, e.touches[0].clientY);
            }

            if (isDragging) {
                e.preventDefault();
            }
        }, { passive: false });

        document.addEventListener('touchend', function (e) {
            if (!bookOpened || !e.changedTouches.length || isCloseButton(e.target)) return;
            lastTouchTime = Date.now();
            endDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchcancel', function () {
            isDragging = false;
        });

        document.addEventListener('mousedown', function (e) {
            if (Date.now() - lastTouchTime < 700 || e.button !== 0 || isCloseButton(e.target)) return;
            startDrag(e.clientX, e.clientY);
            e.preventDefault();
        });

        document.addEventListener('mousemove', function (e) {
            if (Date.now() - lastTouchTime < 700) return;
            spawnMoonTrail(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', function (e) {
            if (Date.now() - lastTouchTime < 700) return;
            endDrag(e.clientX, e.clientY);
        });

        document.addEventListener('dragstart', function (e) {
            e.preventDefault();
        });

        document.addEventListener('wheel', function (e) {
            if (!bookOpened || Math.abs(e.deltaX) < 5) return;
            if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return;

            e.preventDefault();
            if (isTurning || wheelLocked) return;

            wheelDeltaX += e.deltaX;

            clearTimeout(wheelResetTimer);
            wheelResetTimer = setTimeout(function () {
                wheelDeltaX = 0;
            }, 180);

            if (Math.abs(wheelDeltaX) < 60) return;

            wheelLocked = true;
            if (wheelDeltaX > 0) {
                nextPage();
            } else {
                prevPage();
            }

            wheelDeltaX = 0;
            setTimeout(function () {
                wheelLocked = false;
            }, 700);
        }, { passive: false });

        function handleDrag(distanceX, distanceY) {
            if (Math.abs(distanceX) < 60 || Math.abs(distanceX) < Math.abs(distanceY)) {
                return;
            }

            // Deslizar para a esquerda = próxima página
            if (distanceX < 0) {
                nextPage();
            }
            // Deslizar para a direita = página anterior
            else {
                prevPage();
            }
        }

        /* ⌨️ ATALHOS DE TECLADO */
        document.addEventListener('keydown', function (e) {
            if (e.key === 'ArrowRight') {
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                prevPage();
            } else if (e.key === 'Escape') {
                closeBook();
            }
        });

        function registerBookPwa() {
            if (location.protocol === 'file:') {
                if (bookPreloadStatus) {
                    bookPreloadStatus.textContent = 'Para instalar como app, abra por localhost ou por um link.';
                }
                return;
            }

            if (!('serviceWorker' in navigator)) return;

            window.addEventListener('load', function () {
                navigator.serviceWorker.register('./sw.js').catch(function () { });
            });

            window.addEventListener('appinstalled', function () {
                if (bookPreloadStatus) {
                    bookPreloadStatus.textContent = 'App instalado. Agora baixe o livro antes de abrir.';
                }
            });
        }

        registerBookPwa();
    </script>
